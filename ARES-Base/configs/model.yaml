# ARES-Base v1.0 Model Configuration
# Architecture: GPT-2 Decoder-Only Transformer
# Mathematical parity: OpenAI GPT-2 Base (117M / 124M parameters)

model:
  name: "ares-base-gpt2"
  version: "1.0"
  architecture: "decoder-only"

# 1. Architectural Dimensions
dimensions:
  vocab_size: 50257
  max_position_embeddings: 1024
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12

# 2. Regularization & Dropout
dropout:
  embd_pdrop: 0.1
  resid_pdrop: 0.1
  attn_pdrop: 0.1

# 3. Initialization & Layer Normalization
initialization:
  initializer_range: 0.02
  layer_norm_epsilon: 1.0e-5

# 4. Execution & Hardware Optimization Flags
execution:
  use_cache: true      # Fast autoregressive key-value caching during generation
  use_sdpa: true       # PyTorch 2.0+ Scaled Dot-Product Attention (FlashAttention enabled)